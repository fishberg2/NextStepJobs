<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="color:red; font-size:20px; padding:20px;">' + message + '<br/>' + source + ':' + lineno + ':' + colno + '<br/>' + (error && error.stack ? error.stack : '') + '</div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red; font-size:20px; padding:20px;">Unhandled Rejection:' + event.reason + '</div>';
      });
      window.global = window;
      window.process = { env: {}, version: "v20.0.0" };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
